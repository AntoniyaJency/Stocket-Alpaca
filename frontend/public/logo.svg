<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="30" cy="30" r="28" fill="#2B234B" stroke="url(#logoGradient)" stroke-width="2"/>
  
  <!-- Stock chart lines -->
  <polyline points="10,45 15,40 20,42 25,35 30,25 35,30 40,20 45,15 50,18" 
            fill="none" stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Dots for data points -->
  <circle cx="10" cy="45" r="2" fill="#D4AF37"/>
  <circle cx="25" cy="35" r="2" fill="#D4AF37"/>
  <circle cx="30" cy="25" r="2" fill="#D4AF37"/>
  <circle cx="40" cy="20" r="2" fill="#D4AF37"/>
  <circle cx="50" cy="18" r="2" fill="#D4AF37"/>
  
  <!-- "S" for Stocket -->
  <text x="30" y="50" font-family="Arial, sans-serif" font-size="8" font-weight="bold" 
        text-anchor="middle" fill="#D4AF37">S</text>
</svg>
